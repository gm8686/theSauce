<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NHL Trader Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07080d;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% -10%, rgba(43, 78, 126, 0.28), transparent 42%),
          #07080d;
        background-size: 88px 88px, 88px 88px, auto, auto;
        padding: 18px;
      }

      form {
        display: grid;
        width: min(390px, 100%);
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 12vw, 4rem);
        letter-spacing: 0;
        line-height: 0.94;
      }

      p {
        margin: 0 0 12px;
        color: #9aa1b1;
      }

      input,
      button {
        min-height: 52px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.07);
        color: #f5f7fb;
        padding: 0 14px;
      }

      button {
        border: 0;
        background: #00d084;
        color: #07100d;
        cursor: pointer;
        font-weight: 800;
      }

      .error {
        min-height: 22px;
        color: #ff8b8b;
      }
    </style>
  </head>
  <body>
    <form id="login">
      <div>
        <h1>NHL Trader</h1>
        <p>Enter the local password to continue.</p>
      </div>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password" autofocus />
      <button type="submit">Unlock</button>
      <div id="error" class="error" aria-live="polite"></div>
    </form>

    <script>
      const form = document.querySelector("#login");
      const password = document.querySelector("#password");
      const error = document.querySelector("#error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";

        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: password.value }),
        });

        if (response.ok) {
          window.location.href = "/";
          return;
        }

        const body = await response.json().catch(() => ({}));
        error.textContent = body.error || "Unable to unlock.";
        password.select();
      });
    </script>
  </body>
</html>
