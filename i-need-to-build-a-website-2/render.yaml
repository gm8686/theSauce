services:
  - type: web
    name: nhl-polymarket-trader
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ENABLE_LIVE_TRADING
        value: "false"
      - key: BUY_NOTIONAL_USD
        value: "1.02"
      - key: SLIPPAGE_BIPS
        value: "500"
      - key: APP_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nhl-polymarket-trader-db
          property: connectionString
      - key: POLYMARKET_KEY_ID
        sync: false
      - key: POLYMARKET_SECRET_KEY
        sync: false
databases:
  - name: nhl-polymarket-trader-db
    databaseName: nhl_polymarket_trader
    user: nhl_polymarket_trader
